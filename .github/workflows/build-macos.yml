name: Build macOS

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Build
        run: |
          chmod +x build/macos/build.sh
          bash build/macos/build.sh

      - name: Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          files: build/macos/dist/MusicDownloader-*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
