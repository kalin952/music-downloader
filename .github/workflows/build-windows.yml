name: Build Windows

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        uses: AnimMouse/setup-ffmpeg@v1

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller

      - name: Build EXE with PyInstaller
        shell: cmd
        run: |
          pyinstaller --name=MusicDownloader --onefile --windowed ^
            --add-data "frontend;frontend" ^
            --add-data "src;src" ^
            --hidden-import=yt_dlp ^
            --hidden-import=httpx ^
            --hidden-import=aiofiles ^
            --hidden-import=jinja2 ^
            --hidden-import=uvicorn.loops.auto ^
            --hidden-import=uvicorn.protocols.http.auto ^
            --collect-all yt_dlp ^
            --collect-all httpx ^
            --distpath build/windows/dist ^
            --workpath build/windows/pyinstaller-work ^
            run_desktop.py

      - name: Create NSIS Installer
        shell: cmd
        run: |
          echo '!include "MUI2.nsh"' > build/windows/installer.nsi
          echo 'Name "Music Downloader"' >> build/windows/installer.nsi
          echo 'OutFile "build\windows\dist\MusicDownloader-Setup.exe"' >> build/windows/installer.nsi
          echo 'InstallDir "$PROGRAMFILES\MusicDownloader"' >> build/windows/installer.nsi
          echo 'RequestExecutionLevel admin' >> build/windows/installer.nsi
          echo '' >> build/windows/installer.nsi
          echo 'Section' >> build/windows/installer.nsi
          echo '  SetOutPath "$INSTDIR"' >> build/windows/installer.nsi
          echo '  File "build\windows\dist\MusicDownloader.exe"' >> build/windows/installer.nsi
          echo '  CreateShortCut "$DESKTOP\Music Downloader.lnk" "$INSTDIR\MusicDownloader.exe"' >> build/windows/installer.nsi
          echo 'SectionEnd' >> build/windows/installer.nsi
          makensis build/windows/installer.nsi

      - name: Upload Setup
        uses: softprops/action-gh-release@v2
        with:
          files: build/windows/dist/MusicDownloader-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
