<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 头部 -->
        <header class="header">
            <h1 class="logo">
                <span class="logo-icon">🎵</span>
                {{ app_name }}
            </h1>
            <span class="version">v{{ version }}</span>
        </header>

        <!-- 输入区域 -->
        <section class="input-section">
            <div class="input-group">
                <input
                    type="text"
                    id="urlInput"
                    class="url-input"
                    placeholder="粘贴 B站视频 / 网易云音乐 / QQ音乐 链接到这里..."
                    autocomplete="off"
                    autofocus
                >
                <button id="parseBtn" class="btn btn-primary" disabled>
                    <span class="btn-text">解析</span>
                    <span class="btn-spinner hidden">
                        <svg class="spinner" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="3" stroke-dasharray="31.4 31.4"/></svg>
                    </span>
                </button>
            </div>
            <p class="hint">支持 bilibili.com · music.163.com · y.qq.com 以及短链接</p>
        </section>

        <!-- 解析结果 -->
        <section id="resultSection" class="result-section hidden">
            <div class="result-card">
                <div class="result-info">
                    <img id="coverImg" class="cover" src="" alt="" onerror="this.style.display='none'">
                    <div class="info-text">
                        <h3 id="infoTitle" class="info-title"></h3>
                        <p id="infoSub" class="info-sub"></p>
                        <div class="info-meta">
                            <span id="infoDuration" class="meta-tag"></span>
                            <span id="infoPlatform" class="meta-tag platform-tag"></span>
                        </div>
                    </div>
                </div>
                <div class="format-selector">
                    <label class="format-label">选择格式：</label>
                    <div id="formatOptions" class="format-options"></div>
                </div>
                <button id="downloadBtn" class="btn btn-primary btn-block">
                    <span class="btn-text">开始下载</span>
                </button>
            </div>
        </section>

        <!-- 下载进度 -->
        <section id="progressSection" class="progress-section hidden">
            <div class="progress-card">
                <div class="progress-header">
                    <h4 id="progressTitle"></h4>
                    <span id="progressStatus" class="progress-status">准备中...</span>
                </div>
                <div class="progress-bar-container">
                    <div id="progressBar" class="progress-bar" style="width: 0%"></div>
                </div>
                <div class="progress-details">
                    <span id="progressPercent">0%</span>
                    <span id="progressSpeed"></span>
                    <span id="progressEta"></span>
                </div>
            </div>
            <div id="downloadDone" class="download-done hidden">
                <div class="done-icon">✅</div>
                <p>下载完成！</p>
                <button id="openFolderBtn" class="btn btn-secondary">下载文件</button>
                <button id="newTaskBtn" class="btn btn-primary">再来一首</button>
            </div>
        </section>

        <!-- 错误提示 -->
        <div id="errorToast" class="toast toast-error hidden"></div>

        <!-- 下载历史 -->
        <section id="historySection" class="history-section">
            <h3 class="section-title">下载历史</h3>
            <div id="historyList" class="history-list">
                <p class="empty-hint">还没有下载记录</p>
            </div>
        </section>

        <!-- 页脚 -->
        <footer class="footer">
            <p>仅供学习交流，请遵守相关平台用户协议</p>
            <p style="margin-top:8px">
                <a href="https://9c76344595d8496587483f4c03f5f0aa.app.codebuddy.work" target="_blank" style="color:var(--accent);text-decoration:none">下载桌面版</a>
                ·
                <a href="https://github.com/kalin952/music-downloader" target="_blank" style="color:var(--accent);text-decoration:none">GitHub</a>
            </p>
        </footer>
    </div>

    <script>
        // 注入配置（由服务端模板渲染）
        window.API_BASE = '';
        window.APP_VERSION = '{{ version }}';
        window.IS_CLOUD = {{ is_cloud | tojson }};
    </script>
    <script src="/static/js/app.js"></script>
</body>
</html>
